name: Backend PR Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI and check for errors
        working-directory: ./backend
        run: |
          echo "Starting FastAPI app to test startup..."
          timeout 10s uvicorn app.main:app --host 0.0.0.0 --port 8000 || exit 1
